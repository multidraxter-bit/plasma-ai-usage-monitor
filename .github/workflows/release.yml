name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-24.04
    container:
      image: fedora:43

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf -y update
          dnf -y install \
            cmake extra-cmake-modules gcc-c++ \
            qt6-qtbase-devel qt6-qtdeclarative-devel \
            libplasma-devel \
            kf6-kwallet-devel kf6-ki18n-devel kf6-knotifications-devel \
            kf6-kcoreaddons-devel \
            clang-tools-extra \
            libappstream-glib zip \
            git findutils grep

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Clang-Tidy
        run: ./scripts/run_clang_tidy_ci.sh

      - name: Build
        run: |
          cmake --build build --parallel $(nproc) 2>&1 | tee build/build.log

          # Fail if there are any warnings
          if grep -q "warning:" build/build.log; then
            echo "::error::Build produced warnings"
            grep "warning:" build/build.log
            exit 1
          fi

      - name: Test
        run: |
          cd build
          ctest --output-on-failure

      - name: Validate AppStream metainfo
        run: |
          appstream-util validate-relax --nonet com.github.loofi.aiusagemonitor.metainfo.xml

      - name: Package source tarball
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=dev-${GITHUB_SHA::7}
          fi
          bash scripts/package_source_tarball.sh --version "${VERSION}" --output-dir .

      - name: Build .plasmoid archive
        run: |
          bash scripts/package_plasmoid.sh --output-dir .

      - name: Validate packaging consistency
        run: |
          bash scripts/check_version_consistency.sh
          bash scripts/check_flatpak_scaffold.sh
          bash scripts/package_source_tarball.sh --check
          bash scripts/package_plasmoid.sh --check

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=dev-${GITHUB_SHA::7}
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            awk "/^## \\[${VERSION//./\\\\.}\\]/{flag=1;next}/^## \\[/{if(flag)exit}flag" CHANGELOG.md > release_notes.md
            if [[ ! -s release_notes.md ]]; then
              echo "Release ${VERSION}" > release_notes.md
            fi
          else
            printf 'CI validation run for %s (workflow_dispatch).\n' "${VERSION}" > release_notes.md
          fi

      - name: Create or update release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plasma-ai-usage-monitor-*.tar.gz
            com.github.loofi.aiusagemonitor.plasmoid
          body_path: release_notes.md
          make_latest: true
          generate_release_notes: false
