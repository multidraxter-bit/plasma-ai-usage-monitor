name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    container:
      image: fedora:44

    steps:
      - name: Install git
        run: dnf install -y git

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            cmake \
            ninja-build \
            gcc-c++ \
            extra-cmake-modules \
            qt6-qtbase \
            qt6-qtbase-devel \
            qt6-qtdeclarative-devel \
            libplasma-devel \
            kf6-kwallet-devel \
            kf6-ki18n-devel \
            kf6-knotifications-devel \
            kf6-kcoreaddons-devel \
            openssl-devel \
            python3 \
            appstream \
            rpmlint \
            python3-PyQt6 \
            xorg-x11-server-Xvfb

      - name: Validate release consistency
        run: |
          bash scripts/check_version_consistency.sh
          bash scripts/check_no_hardcoded_versions.sh
          bash scripts/check_flatpak_scaffold.sh
          python3 scripts/check_provider_catalog.py
          python3 scripts/check_qml_registered_types.py

      - name: Validate AppStream and RPM
        run: |
          appstreamcli validate com.github.loofi.aiusagemonitor.metainfo.xml
          rpmlint plasma-ai-usage-monitor.spec

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          bash scripts/package_source_tarball.sh --check
          bash scripts/package_plasmoid.sh --check
          bash scripts/package_source_tarball.sh

      - name: Check Package Payload
        run: python3 scripts/check_package_payload.py
